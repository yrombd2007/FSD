<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nth Child Selector</title>
    <style>
        ol{
            font-size: 40px;
            color: crimson;
        }
        li:nth-child(even){
            color: seagreen;
            font-size: 50px
    }
    </style>
    
</head>
<body>
    <h1>First Child Selector in CSS</h1>
    <ol>
        <li>om</li>
        <li>Arpit</li>
        <li>Pari</li>
        <li>Divy</li>
        <li>bhoomi</li>
        <li>Hasnain</li>
    </ol>
</body>
</html>
