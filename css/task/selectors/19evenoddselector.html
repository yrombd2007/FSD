<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even and Odd Selector in CSS</title>
    <style>
        /* Even and Odd Selector In CSS */
        ol{
            background-color: black;
            color: aliceblue;
            font-size: 32px;
        }
        li:nth-child(even){
            background-color: cadetblue;
        }
        li:nth-child(odd){
            background-color:darkblue;
        }
    </style>
</head>
<body>
    <ol>
        <li>SevPuri</li>
        <li>BhelPuri</li>
        <li>DahiPuri</li>
        <li>SamosaChaat</li>
        <li>RajKachori</li>
        <li>PaaniPuri</li>
        <li>BasketChaat</li>
        <li>BhallaPaapdiChaat</li>
    </ol>
</body>
</html>
