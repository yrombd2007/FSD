<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:: Before Selector</title>
    <style>
        h1{
            font-size: 40px;
            color: whitesmoke;
            background-color: black;
        }
        h2{
            font-size: 36px;
        }
        /* :: Before Selector in CSS */
        h2::before{
            content: ' \2605';
            color: red;
            }
    </style>
</head>
<body>
    <h1>:: Before Selector in CSS</h1>
    <hr>
    <h2>:: Before Selector</h2>
    <h2>:: After Selector</h2>
    <h2>:: Between Selector</h2>
</body>
</html>
