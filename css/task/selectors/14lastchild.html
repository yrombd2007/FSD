<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Child Selector</title>
    <style>
        ul{
            font-size: 40px;
            color: crimson;
        }
        li:last-child{
            color: rgb(0, 55, 255);
            font-size: 50px
    }
    </style>
    
</head>
<body>
    <h1>Last Child Selector in CSS</h1>
    <ul>
        <li>OM</li>
        <li>OM</li>
        <li>OM</li>
        <li>OM </li>
    </ul>
</body>
</html>
